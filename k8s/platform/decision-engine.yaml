apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-engine
  labels:
    app: decision-engine
    component: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: decision-engine
  template:
    metadata:
      labels:
        app: decision-engine
        component: platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: chaos-platform-sa
      containers:
        - name: decision-engine
          image: k3d-skam-registry:5111/decision-engine:latest
          ports:
            - containerPort: 8002
              name: http
          env:
            - name: ANOMALY_DETECTOR_URL
              value: "http://anomaly-detector:8001"
            - name: CHAOS_ENGINE_URL
              value: "http://chaos-engine:8000"
            - name: POLL_INTERVAL
              value: "10"
            - name: COOLDOWN_SECONDS
              value: "120"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: decision-engine
  labels:
    app: decision-engine
spec:
  selector:
    app: decision-engine
  ports:
    - port: 8002
      targetPort: 8002
      name: http
  type: ClusterIP
