apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detector
  labels:
    app: anomaly-detector
    component: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-detector
  template:
    metadata:
      labels:
        app: anomaly-detector
        component: platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: anomaly-detector
          image: k3d-skam-registry:5111/anomaly-detector:latest
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090"
            - name: DETECTION_INTERVAL
              value: "15"
            - name: ANOMALY_THRESHOLD
              value: "0.7"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-detector
  labels:
    app: anomaly-detector
spec:
  selector:
    app: anomaly-detector
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  type: ClusterIP
