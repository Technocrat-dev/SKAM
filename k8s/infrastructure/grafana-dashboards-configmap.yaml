# Grafana Dashboard ConfigMap
# The kube-prometheus-stack Grafana sidecar automatically loads ConfigMaps
# with the label grafana_dashboard: "1"
#
# USAGE: This file is auto-generated by `make deploy-dashboards`.
# To manually create it, run:
#   kubectl create configmap grafana-dashboards -n monitoring \
#     --from-file=k8s/infrastructure/grafana-dashboards/ \
#     -o yaml --dry-run=client | kubectl apply -f -
#
# Alternatively, the Makefile infra-deploy target handles this automatically.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
